name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://lifeos:change-me-locally@127.0.0.1:5432/lifeos

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Prepare synthetic local configuration
        run: cp .env.example .env

      - name: Scan tracked files for secrets
        run: npm run security:secrets

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Start local PostgreSQL
        run: npm run db:start

      - name: Validate and generate Prisma Client
        run: npm run db:validate && npm run db:generate

      - name: Apply migrations and synthetic seed
        run: npm run db:migrate && npm run db:seed

      - name: Verify migration, backup and restore
        run: npm run db:verify:recovery

      - name: Lint and type-check workspaces
        run: npm run lint && npm run typecheck

      - name: Build applications and packages
        run: npm run build

      - name: Run repository and workspace tests
        run: npm test

      - name: Stop local PostgreSQL
        if: always()
        run: docker compose down
