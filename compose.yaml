services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifeos}
      POSTGRES_USER: ${POSTGRES_USER:-lifeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
    ports:
      - "5432:5432"
    volumes:
      - lifeos-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-lifeos} -d $${POSTGRES_DB:-lifeos}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lifeos-postgres:
